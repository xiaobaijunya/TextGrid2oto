name: 自动打包发布程序

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '输入自定义版本号 (例如: 1.2.3)'
        required: false
        default: '0.1.2'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        run: |
          pip install pyinstaller
          pip install onnxruntime-directml numpy librosa textgrid wxpython

      - name: 打包 Windows 版本
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pyinstaller GUI.spec
          mkdir -p dist/TextGrid2oto/img
          mkdir -p dist/TextGrid2oto/presamp
          mkdir -p dist/TextGrid2oto/tg2svdb/字典
          Copy-Item -Path img/TextGrid2oto.ico -Destination dist/TextGrid2oto/img/
          Copy-Item -Path presamp -Destination dist/TextGrid2oto/ -Recurse
          Copy-Item -Path tg2svdb/字典 -Destination dist/TextGrid2oto/tg2svdb/ -Recurse

      - name: 打包 Mac 版本
        if: matrix.os == 'macos-latest'
        run: |
          pyinstaller GUI.spec
          mkdir -p dist/TextGrid2oto.app/Contents/MacOS/img
          mkdir -p dist/TextGrid2oto.app/Contents/MacOS/presamp
          mkdir -p dist/TextGrid2oto.app/Contents/MacOS/tg2svdb/字典
          cp img/TextGrid2oto.ico dist/TextGrid2oto.app/Contents/MacOS/img/
          cp -r presamp dist/TextGrid2oto.app/Contents/MacOS/
          cp -r tg2svdb/字典 dist/TextGrid2oto.app/Contents/MacOS/tg2svdb/

      - name: 创建发布压缩包
        id: create_release
        shell: pwsh
        run: |
          if ("${{ github.event.inputs.version }}" -ne "") {
            $version = "${{ github.event.inputs.version }}"
          } elseif ("${{ github.ref_type }}" -eq "tag") {
            $version = "${{ github.ref_name }}".Replace("v", "")
          } else {
            $version = "Test"
          }
          echo "version=$version" >> $env:GITHUB_OUTPUT
          
          if ("${{ matrix.os }}" -eq "windows-latest") {
            Compress-Archive -Path dist/TextGrid2oto/* -DestinationPath TextGrid2oto-$version-windows.zip
          } else {
            Compress-Archive -Path dist/TextGrid2oto.app/* -DestinationPath TextGrid2oto-$version-mac.zip
          }

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TextGrid2oto-${{ steps.create_release.outputs.version }}-${{ matrix.os }}
          path: |
            TextGrid2oto-*.zip

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/TextGrid2oto-*-windows.zip
            artifacts/TextGrid2oto-*-mac.zip
          body: |
            ## 版本 ${{ github.ref_name }} 更新内容
            

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}