name: 自动打包发布程序

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: '输入自定义版本号 (例如: 1.2.3)'
        required: false
        default: '0.1.2'

jobs:
  build:
    strategy:
      matrix:
        os: [windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: 设置 Python 环境
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: 安装依赖
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          pip install onnxruntime-directml
          pip install numpy librosa textgrid wxpython
          pip install pyinstaller

      - name: 安装依赖
        if: matrix.os == 'macos-latest'
        shell: bash
        run: |
          pip install onnxruntime
          pip install numpy librosa textgrid wxpython
          pip install pyinstaller

      - name: 打包程序
        run: |
          pyinstaller GUI.spec

      - name: 上传构建产物
        uses: actions/upload-artifact@v4
        with:
          name: TextGrid2oto-${{ matrix.os }}
          path: |
            dist/TextGrid2oto.exe
            dist/TextGrid2oto.app

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - name: 下载所有构建产物
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: 发布到 GitHub Releases
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          name: "Release ${{ github.ref_name }}"
          draft: false
          prerelease: false
          files: |
            artifacts/TextGrid2oto-windows-latest/TextGrid2oto.exe
            artifacts/TextGrid2oto-macos-latest/TextGrid2oto.app
          body: |
            ## 版本 ${{ github.ref_name }} 更新内容

        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}